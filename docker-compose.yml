services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.meu-tcc-front.rule=Host(`tcc-murilo-frontschoollabok-hoibwi-f69845-172-237-53-150.sslip.io`)
      - traefik.http.routers.meu-tcc-front.entrypoints=web
      - traefik.http.services.meu-tcc-front.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

networks:
  dokploy-network:
    external: true